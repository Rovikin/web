<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTCUSDT — Chart Offline</title>
<style>
  @font-face {
    font-family: 'ChartMono';
    src: local('JetBrains Mono'), local('SF Mono'), local('Consolas');
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0a0e14;
    color: #c9d1d9;
    font-family: 'ChartMono', ui-monospace, 'SF Mono', Consolas, monospace;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #1c232e;
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand .pair {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #e6edf3;
  }

  .brand .sub {
    font-size: 11px;
    color: #58636f;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tf-tabs, .scale-tabs {
    display: flex;
    gap: 2px;
    background: #11161d;
    border: 1px solid #1c232e;
    border-radius: 6px;
    padding: 2px;
  }

  .tf-tabs button, .scale-tabs button {
    background: transparent;
    border: none;
    color: #6b7684;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .tf-tabs button:hover, .scale-tabs button:hover { color: #c9d1d9; }

  .tf-tabs button.active, .scale-tabs button.active {
    background: #1f2733;
    color: #e6edf3;
  }

  .stats {
    display: flex;
    gap: 22px;
    font-size: 12px;
  }

  .stats .stat-label {
    color: #58636f;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: block;
    margin-bottom: 2px;
  }

  .stats .stat-value {
    font-size: 13px;
    font-weight: 600;
    color: #e6edf3;
  }

  .stats .stat-value.up { color: #3fb950; }
  .stats .stat-value.down { color: #f85149; }

  #chart-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #crosshair-info {
    position: absolute;
    top: 14px;
    left: 20px;
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
    background: rgba(10, 14, 20, 0.85);
    border: 1px solid #1c232e;
    border-radius: 6px;
    padding: 10px 14px;
    display: none;
    z-index: 5;
  }

  #crosshair-info .row {
    display: flex;
    gap: 8px;
  }

  #crosshair-info .k {
    color: #58636f;
    width: 42px;
  }

  #crosshair-info .v {
    color: #e6edf3;
    font-weight: 600;
    min-width: 90px;
  }

  #crosshair-info .v.green { color: #3fb950; }
  #crosshair-info .v.red { color: #f85149; }

  #status-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    background: #0a0e14;
    z-index: 10;
    font-size: 13px;
    color: #6b7684;
    text-align: center;
    padding: 20px;
  }

  #status-overlay code {
    background: #11161d;
    border: 1px solid #1c232e;
    padding: 2px 8px;
    border-radius: 4px;
    color: #e6edf3;
  }

  #status-overlay.error { color: #f85149; }

  footer {
    padding: 8px 20px;
    border-top: 1px solid #1c232e;
    font-size: 10.5px;
    color: #45505c;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }

  ::selection { background: #26a69a44; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <span class="pair">BTC/USDT</span>
      <span class="sub">Binance Spot &middot; <a href="https://github.com/Rovikin/web/tree/main/chart">Download Data CSV</a></span>
    </div>

    <div class="controls">
      <div class="tf-tabs" id="tf-tabs">
        <button data-tf="daily">D</button>
        <button data-tf="weekly">W</button>
        <button data-tf="monthly" class="active">M</button>
      </div>

      <div class="scale-tabs" id="scale-tabs">
        <button data-scale="linear" class="active">Linear</button>
        <button data-scale="log">Log</button>
      </div>
    </div>

    <div class="stats">
      <div>
        <span class="stat-label">Candle</span>
        <span class="stat-value" id="stat-count">—</span>
      </div>
      <div>
        <span class="stat-label">Rentang</span>
        <span class="stat-value" id="stat-range">—</span>
      </div>
      <div>
        <span class="stat-label">Terakhir</span>
        <span class="stat-value" id="stat-last">—</span>
      </div>
      <div>
        <span class="stat-label">Perubahan</span>
        <span class="stat-value" id="stat-change">—</span>
      </div>
    </div>
  </header>

  <div id="chart-wrap">
    <canvas id="chart"></canvas>
    <div id="crosshair-info"></div>
    <div id="status-overlay">Memuat data CSV...</div>
  </div>

  <footer>
    <span>Scroll = zoom &middot; Drag = geser &middot; Dijalankan via local server</span>
    <span id="footer-src">btcusdt_monthly.csv</span>
  </footer>
</div>

<script>
(function () {
  const CSV_FILES = {
    daily: 'btcusdt_daily.csv',
    weekly: 'btcusdt_weekly.csv',
    monthly: 'btcusdt_monthly.csv',
  };

  const RAW = {}; // tf -> [[open_time, open, high, low, close], ...]

  const state = {
    tf: 'monthly',
    scale: 'linear',
    data: null,
    viewStart: 0,
    viewEnd: 0,
    hoverIndex: -1,
  };

  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('chart-wrap');
  const infoBox = document.getElementById('crosshair-info');
  const statusOverlay = document.getElementById('status-overlay');

  const COLOR_GREEN = '#26a69a';
  const COLOR_RED = '#ef5350';
  const COLOR_GRID = '#161b22';
  const COLOR_AXIS_TEXT = '#58636f';
  const COLOR_CROSSHAIR = '#3d4653';

  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    const header = lines[0].split(',');
    const idxOpenTime = header.indexOf('open_time');
    const idxOpen = header.indexOf('open');
    const idxHigh = header.indexOf('high');
    const idxLow = header.indexOf('low');
    const idxClose = header.indexOf('close');

    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i];
      if (!line) continue;
      const cols = line.split(',');
      rows.push([
        parseInt(cols[idxOpenTime], 10),
        parseFloat(cols[idxOpen]),
        parseFloat(cols[idxHigh]),
        parseFloat(cols[idxLow]),
        parseFloat(cols[idxClose]),
      ]);
    }
    rows.sort((a, b) => a[0] - b[0]);
    return rows;
  }

  async function loadAllCSV() {
    const entries = Object.entries(CSV_FILES);
    for (const [tf, filename] of entries) {
      statusOverlay.textContent = `Memuat ${filename}...`;
      let resp;
      try {
        resp = await fetch(filename, { cache: 'no-store' });
      } catch (err) {
        throw new Error(`Gagal fetch ${filename}: ${err.message}`);
      }
      if (!resp.ok) {
        throw new Error(`${filename} tidak ditemukan (HTTP ${resp.status}). Pastikan file berada di folder yang sama dengan HTML ini, lalu dijalankan lewat local server.`);
      }
      const text = await resp.text();
      RAW[tf] = parseCSV(text);
    }
  }

  function fmtDate(ms, tf) {
    const d = new Date(ms);
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth() + 1).padStart(2, '0');
    const day = String(d.getUTCDate()).padStart(2, '0');
    if (tf === 'monthly') return `${y}-${m}`;
    return `${y}-${m}-${day}`;
  }

  function fmtPrice(v) {
    return v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function setTimeframe(tf) {
    state.tf = tf;
    state.data = RAW[tf];
    state.viewStart = 0;
    state.viewEnd = state.data.length - 1;
    state.hoverIndex = -1;
    infoBox.style.display = 'none';

    document.querySelectorAll('.tf-tabs button').forEach(b => {
      b.classList.toggle('active', b.dataset.tf === tf);
    });
    document.getElementById('footer-src').textContent = CSV_FILES[tf];

    updateStats();
    render();
  }

  function setScale(scale) {
    state.scale = scale;
    document.querySelectorAll('.scale-tabs button').forEach(b => {
      b.classList.toggle('active', b.dataset.scale === scale);
    });
    render();
  }

  function updateStats() {
    const d = state.data;
    document.getElementById('stat-count').textContent = d.length.toLocaleString('en-US');
    document.getElementById('stat-range').textContent =
      `${fmtDate(d[0][0], state.tf)} → ${fmtDate(d[d.length - 1][0], state.tf)}`;

    const last = d[d.length - 1];
    document.getElementById('stat-last').textContent = fmtPrice(last[4]);

    const first = d[0][4];
    const change = ((last[4] - first) / first) * 100;
    const changeEl = document.getElementById('stat-change');
    changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
    changeEl.className = 'stat-value ' + (change >= 0 ? 'up' : 'down');
  }

  function visibleSlice() {
    const s = Math.max(0, Math.floor(state.viewStart));
    const e = Math.min(state.data.length - 1, Math.ceil(state.viewEnd));
    return { s, e };
  }

  // Transform harga -> ruang "unit" yang dipakai untuk pemetaan Y (log atau linear)
  function toUnit(price) {
    return state.scale === 'log' ? Math.log(Math.max(price, 1e-9)) : price;
  }

  function render() {
    if (!state.data) return;
    const rect = wrap.getBoundingClientRect();
    const W = rect.width;
    const H = rect.height;
    ctx.clearRect(0, 0, W, H);

    const { s, e } = visibleSlice();
    const slice = state.data.slice(s, e + 1);
    if (slice.length === 0) return;

    const padLeft = 12;
    const padRight = 64;
    const padTop = 16;
    const padBottom = 28;
    const plotW = W - padLeft - padRight;
    const plotH = H - padTop - padBottom;

    let lo = Infinity, hi = -Infinity;
    for (const c of slice) {
      if (c[3] < lo) lo = c[3];
      if (c[2] > hi) hi = c[2];
    }
    const loUnit0 = toUnit(lo);
    const hiUnit0 = toUnit(hi);
    const marginUnit = (hiUnit0 - loUnit0) * 0.08 || 0.05;
    const loUnit = loUnit0 - marginUnit;
    const hiUnit = hiUnit0 + marginUnit;

    function xAt(i) {
      const rel = (i - s) / Math.max(1, (e - s));
      return padLeft + rel * plotW;
    }
    function yAt(price) {
      const u = toUnit(price);
      return padTop + (1 - (u - loUnit) / (hiUnit - loUnit)) * plotH;
    }

    // grid + y axis labels
    ctx.strokeStyle = COLOR_GRID;
    ctx.fillStyle = COLOR_AXIS_TEXT;
    ctx.font = '10px ui-monospace, monospace';
    ctx.textBaseline = 'middle';
    const gridLines = 6;
    for (let g = 0; g <= gridLines; g++) {
      const u = loUnit + (hiUnit - loUnit) * (g / gridLines);
      const price = state.scale === 'log' ? Math.exp(u) : u;
      const y = padTop + (1 - g / gridLines) * plotH;
      ctx.beginPath();
      ctx.moveTo(padLeft, y);
      ctx.lineTo(W - padRight, y);
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillText(fmtPrice(price), W - padRight + 8, y);
    }

    // candles
    const n = slice.length;
    const candleSlotW = plotW / n;
    const bodyW = Math.max(1, Math.min(candleSlotW * 0.65, 14));

    slice.forEach((c, idx) => {
      const i = s + idx;
      const [t, o, h, l, cl] = c;
      const x = xAt(i);
      const isGreen = cl >= o;
      const color = isGreen ? COLOR_GREEN : COLOR_RED;

      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, yAt(h));
      ctx.lineTo(x, yAt(l));
      ctx.stroke();

      const yO = yAt(o);
      const yC = yAt(cl);
      const bodyTop = Math.min(yO, yC);
      const bodyH = Math.max(1, Math.abs(yC - yO));

      ctx.fillStyle = color;
      ctx.fillRect(x - bodyW / 2, bodyTop, bodyW, bodyH);
    });

    // x axis labels (sparse)
    ctx.fillStyle = COLOR_AXIS_TEXT;
    ctx.textAlign = 'center';
    const labelCount = Math.min(8, n);
    for (let k = 0; k <= labelCount; k++) {
      const idx = Math.round((k / labelCount) * (n - 1));
      const i = s + idx;
      if (i < 0 || i >= state.data.length) continue;
      const x = xAt(i);
      ctx.fillText(fmtDate(state.data[i][0], state.tf), x, H - padBottom + 16);
    }
    ctx.textAlign = 'left';

    // crosshair
    if (state.hoverIndex >= s && state.hoverIndex <= e) {
      const x = xAt(state.hoverIndex);
      ctx.strokeStyle = COLOR_CROSSHAIR;
      ctx.setLineDash([3, 3]);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, padTop);
      ctx.lineTo(x, H - padBottom);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    state._layout = { s, e, xAt, yAt, padLeft, padRight, plotW };
  }

  function onMouseMove(evt) {
    const rect = wrap.getBoundingClientRect();
    const mx = evt.clientX - rect.left;
    const layout = state._layout;
    if (!layout) return;

    const { s, e, plotW, padLeft } = layout;
    const n = e - s + 1;
    const rel = (mx - padLeft) / plotW;
    let idx = s + Math.round(rel * (n - 1));
    idx = Math.max(s, Math.min(e, idx));

    if (idx !== state.hoverIndex) {
      state.hoverIndex = idx;
      render();
    }

    const c = state.data[idx];
    if (!c) { infoBox.style.display = 'none'; return; }
    const [t, o, h, l, cl] = c;
    const isGreen = cl >= o;
    const cls = isGreen ? 'green' : 'red';

    infoBox.innerHTML = `
      <div class="row"><span class="k">Date</span><span class="v">${fmtDate(t, state.tf)}</span></div>
      <div class="row"><span class="k">Open</span><span class="v">${fmtPrice(o)}</span></div>
      <div class="row"><span class="k">High</span><span class="v">${fmtPrice(h)}</span></div>
      <div class="row"><span class="k">Low</span><span class="v">${fmtPrice(l)}</span></div>
      <div class="row"><span class="k">Close</span><span class="v ${cls}">${fmtPrice(cl)}</span></div>
    `;
    infoBox.style.display = 'block';
  }

  function onMouseLeave() {
    state.hoverIndex = -1;
    infoBox.style.display = 'none';
    render();
  }

  function onWheel(evt) {
    evt.preventDefault();
    const { s, e } = visibleSlice();
    const n = e - s;
    const zoomFactor = evt.deltaY > 0 ? 1.15 : 0.87;
    let newN = Math.max(10, Math.min(state.data.length - 1, Math.round(n * zoomFactor)));

    const rect = wrap.getBoundingClientRect();
    const mx = evt.clientX - rect.left;
    const relX = Math.max(0, Math.min(1, (mx - 12) / (rect.width - 12 - 64)));
    const centerIdx = s + relX * n;

    let newS = Math.round(centerIdx - relX * newN);
    let newE = newS + newN;

    if (newS < 0) { newE -= newS; newS = 0; }
    if (newE > state.data.length - 1) { newS -= (newE - (state.data.length - 1)); newE = state.data.length - 1; }
    newS = Math.max(0, newS);

    state.viewStart = newS;
    state.viewEnd = newE;
    render();
  }

  let isDragging = false;
  let dragStartX = 0;
  let dragViewStart = 0;
  let dragViewEnd = 0;

  function onMouseDown(evt) {
    isDragging = true;
    dragStartX = evt.clientX;
    dragViewStart = state.viewStart;
    dragViewEnd = state.viewEnd;
  }

  function onDragMove(evt) {
    if (!isDragging) return;
    const rect = wrap.getBoundingClientRect();
    const plotW = rect.width - 12 - 64;
    const n = dragViewEnd - dragViewStart;
    const dx = evt.clientX - dragStartX;
    const shift = -(dx / plotW) * n;

    let newS = dragViewStart + shift;
    let newE = dragViewEnd + shift;

    if (newS < 0) { newE -= newS; newS = 0; }
    if (newE > state.data.length - 1) { newS -= (newE - (state.data.length - 1)); newE = state.data.length - 1; }
    newS = Math.max(0, newS);

    state.viewStart = newS;
    state.viewEnd = newE;
    render();
  }

  function onMouseUp() {
    isDragging = false;
  }

  function resizeCanvas() {
    const rect = wrap.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    render();
  }

  document.getElementById('tf-tabs').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-tf]');
    if (btn) setTimeframe(btn.dataset.tf);
  });

  document.getElementById('scale-tabs').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-scale]');
    if (btn) setScale(btn.dataset.scale);
  });

  wrap.addEventListener('mousemove', (e) => {
    onDragMove(e);
    onMouseMove(e);
  });
  wrap.addEventListener('mouseleave', onMouseLeave);
  wrap.addEventListener('wheel', onWheel, { passive: false });
  wrap.addEventListener('mousedown', onMouseDown);
  window.addEventListener('mouseup', onMouseUp);
  window.addEventListener('resize', resizeCanvas);

  loadAllCSV()
    .then(() => {
      statusOverlay.style.display = 'none';
      setTimeframe('monthly');
      resizeCanvas();
    })
    .catch((err) => {
      statusOverlay.classList.add('error');
      statusOverlay.innerHTML = `Gagal memuat data:<br><code>${err.message}</code>`;
      console.error(err);
    });
})();
</script>
</body>
</html>
